name: Build and deploy scatter visualization to Azure Web App - hodoscope

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  REGISTRY: misfitregistry.azurecr.io
  IMAGE_NAME: hodoscope

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate scatter visualization
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AZDO_TOKEN: ${{ secrets.AZDO_TOKEN }}
          AZDO_ORG_URL: https://dev.azure.com/misfitsandmachines
          WRIKE_TOKEN: ${{ secrets.WRIKE_TOKEN }}
        run: npx tsx scripts/demo-scatter.ts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_9DC15219671B45068C51EF83FEC02D08 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_9C59008B6F7F474B8DB8946E562DA0A9 }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AC8F40FD3FE748C99DC7861ED622092E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B0E03DAC7E24A4290757DB829F914D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_330D90CD0AF044E695032E53AE7F8ABF }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "hodoscope"
          slot-name: "Production"
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
